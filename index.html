        // Função para renderizar jogos
        function renderizarJogos(jogos) {
            if (!jogos || jogos.length === 0) {

                jogos = dadosExemplo;
                updateDebug('🟠 Usando dados de exemplo', 'Firestore vazio ou sem conexão. Mostrando exemplos.');

            }
            
            todosJogos = jogos;
            totalSpan.textContent = jogos.length;
            
            container.innerHTML = "";
            
            jogos.forEach((jogo) => {
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `

                `;
                
                card.onclick = () => abrirModal(jogo);
                container.appendChild(card);
            });
        }

        // Carregar do Firestore
        async function carregarJogos() {
            try {
                updateDebug('🟡 Buscando jogos...', 'Consultando Firestore');
                
                const q = query(collection(db, "jogos"), orderBy("dataCriacao", "desc"));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    updateDebug('🟠 Nenhum jogo encontrado', 'O Firestore está vazio. Use o botão "Postar Jogo" para adicionar!');
                    renderizarJogos([]);
                    return;
                }
                
                const jogos = [];
                snapshot.forEach((doc) => {
                    jogos.push({
                        id: doc.id,
                        ...doc.data()
                    });
                });
                
                renderizarJogos(jogos);
                
            } catch (error) {
                console.error('Erro ao carregar:', error);
                updateDebug('🔴 Erro ao carregar do Firestore', error.message, true);
                renderizarJogos([]);
            }

        // Fechar com ESC ou clique fora

            const modal = document.getElementById('gameModal');
            if (event.target === modal) {

        document.addEventListener('keydown', (e) => {
