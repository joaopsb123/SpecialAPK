<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="2WVmzDBXADMLj4A62OjzHfmY82XA-ZNgvSg-z9A0hsM" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço APK | Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0b0e11; 
            --card: #15191d; 
            --accent: #00ff73; 
            --text: #ffffff; 
            --text-dim: #a0a6af;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0;
        }
        
        /* Barra de Navegação */
        nav { 
            background: var(--card); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid var(--accent); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .logo { 
            font-weight: 600; 
            font-size: 1.5rem; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .container { 
            max-width: 1100px; 
            margin: auto; 
            padding: 20px; 
        }

        h2 { border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 25px; }

        /* Grid de Jogos */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
        }

        .card { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            transition: 0.3s; 
            border: 1px solid #222; 
            cursor: pointer; 
            position: relative;
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent); 
            box-shadow: 0 10px 20px rgba(0, 255, 115, 0.1);
        }
        .card img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
        }
        .card-info { 
            padding: 12px; 
            text-align: center; 
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .card-info h3 { 
            margin: 0; 
            font-size: 0.95rem; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
        }

        /* Modal (Página do Jogo) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .modal-content { 
            background: var(--card); 
            max-width: 500px; 
            width: 100%; 
            border-radius: 20px; 
            overflow: hidden; 
            position: relative; 
            animation: slideIn 0.3s ease; 
        }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .close-btn { 
            position: absolute; 
            top: 15px; right: 20px; 
            font-size: 35px; 
            cursor: pointer; 
            color: var(--accent); 
            z-index: 10;
        }
        .modal-body { padding: 30px; text-align: center; }
        .modal-img { width: 100%; border-radius: 12px; margin-bottom: 20px; max-height: 250px; object-fit: cover; }
        
        .btn-dl { 
            display: inline-block; 
            background: var(--accent); 
            color: #000; 
            padding: 15px 40px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            margin-top: 25px; 
            width: 80%; 
            font-size: 1.1rem;
            transition: 0.2s;
        }
        .btn-dl:hover { transform: scale(1.05); filter: brightness(1.1); }
        
        /* Botão Flutuante para postar */
        .floating-admin { 
            position: fixed; 
            bottom: 25px; 
            right: 25px; 
            background: #1c1c1c; 
            color: var(--accent); 
            width: 50px; height: 50px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-decoration: none; 
            border: 2px solid var(--accent); 
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ESPAÇO APK</div>
    </nav>

    <div class="container">
        <h2>🔥 Catálogo de Jogos</h2>
        <div id="lista-jogos" class="grid">
            </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <div id="modalData" class="modal-body">
                </div>
        </div>
    </div>

    <a href="postar.html" class="floating-admin" title="Admin">⚙️</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANG8-gOrsk3LZz_9kYqQnz-X7ZVbDQ6x4",
            authDomain: "specialapk-12982.firebaseapp.com",
            projectId: "specialapk-12982",
            storageBucket: "specialapk-12982.firebasestorage.app",
            messagingSenderId: "27533590283",
            appId: "1:27533590283:web:143892ea20a65d7f392c0e",
            measurementId: "G-CR7JBM8TD9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Carregar Jogos em Tempo Real
        const q = query(collection(db, "jogos"), orderBy("dataCriacao", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('lista-jogos');
            container.innerHTML = ""; // Limpa antes de carregar
            
            snapshot.forEach((doc) => {
                const jogo = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                
                // Imagem padrão caso o link falhe
                const imgUrl = jogo.imagemUrl || 'https://via.placeholder.com/200x300?text=Sem+Imagem';
                
                card.innerHTML = `
                    <img src="${imgUrl}" alt="${jogo.nome}">
                    <div class="card-info">
                        <h3>${jogo.nome}</h3>
                    </div>
                `;
                
                // Ao clicar no card, abre o modal com detalhes
                card.onclick = () => abrirModal(jogo);
                container.appendChild(card);
            });
        });

        // Função para abrir o modal do jogo
        window.abrirModal = (jogo) => {
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('modalData');
            
            content.innerHTML = `
                <img src="${jogo.imagemUrl}" class="modal-img">
                <h2 style="margin: 0 0 10px 0; color: var(--accent);">${jogo.nome}</h2>
                <p style="color: #ccc; font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px;">
                    ${jogo.descricao || 'Sem descrição disponível.'}
                </p>
                <a href="${jogo.link}" target="_blank" class="btn-dl">BAIXAR VIA MEDIAFIRE</a>
            `;
            
            modal.style.display = "flex";
        };

        // Função para fechar o modal
        window.fecharModal = () => {
            document.getElementById('gameModal').style.display = "none";
        };

        // Fechar modal ao clicar fora dele
        window.onclick = (event) => {
            const modal = document.getElementById('gameModal');
            if (event.target == modal) {
                fecharModal();
            }
        };
    </script>
</body>
</html>
