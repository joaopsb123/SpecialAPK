<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço APK | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e11; --card: #15191d; --accent: #00ff73; --text: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        
        /* Navbar */
        nav { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 600; font-size: 1.5rem; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        /* Grid de Jogos */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: 0.3s; border: 1px solid #222; cursor: pointer; }
        .card:hover { transform: scale(1.05); border-color: var(--accent); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; }
        .card-info h3 { margin: 5px 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Modal (Página do Jogo) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card); max-width: 500px; width: 100%; border-radius: 20px; overflow: hidden; position: relative; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: var(--accent); }
        .modal-body { padding: 25px; text-align: center; }
        .modal-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .btn-dl { display: inline-block; background: var(--accent); color: #000; padding: 12px 30px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; width: 80%; }
        
        .floating-admin { position: fixed; bottom: 20px; right: 20px; background: #222; color: #fff; padding: 10px; border-radius: 50%; text-decoration: none; font-size: 12px; border: 1px solid var(--accent); }
    </style>
</head>
<body>

    <nav><div class="logo">ESPAÇO APK</div></nav>

    <div class="container">
        <h2 style="color: var(--accent);">🔥 Destaques</h2>
        <div id="lista-jogos" class="grid">
            </div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <div id="modalData" class="modal-body"></div>
        </div>
    </div>

    <a href="postar.html" class="floating-admin">⚙️</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANG8-gOrsk3LZz_9kYqQnz-X7ZVbDQ6x4",
            authDomain: "specialapk-12982.firebaseapp.com",
            projectId: "specialapk-12982",
            storageBucket: "specialapk-12982.firebasestorage.app",
            messagingSenderId: "27533590283",
            appId: "1:27533590283:web:143892ea20a65d7f392c0e",
            measurementId: "G-CR7JBM8TD9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Carregar Jogos
        const q = query(collection(db, "jogos"), orderBy("dataCriacao", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('lista-jogos');
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const jogo = doc.data();
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${jogo.imagemUrl || 'https://via.placeholder.com/200x300'}">
                    <div class="card-info"><h3>${jogo.nome}</h3></div>
                `;
                card.onclick = () => abrirModal(jogo);
                container.appendChild(card);
            });
        });

        window.abrirModal = (jogo) => {
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('modalData');
            content.innerHTML = `
                <img src="${jogo.imagemUrl}" class="modal-img">
                <h2 style="margin-bottom:5px;">${jogo.nome}</h2>
                <p style="color:#aaa; font-size:14px;">${jogo.descricao}</p>
                <a href="${jogo.link}" target="_blank" class="btn-dl">BAIXAR AGORA (Mediafire)</a>
            `;
            modal.style.display = "flex";
        };

        window.fecharModal = () => document.getElementById('gameModal').style.display = "none";
    </script>
</body>
</html>
