<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço APK | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080a0c; --card: #12161b; --accent: #00ff73; --text: #ffffff; --text-dim: #94a3b8; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        /* HEADER & BUSCA */
        header { 
            background: var(--card); 
            padding: 20px; 
            border-bottom: 1px solid #222; 
            position: sticky; top: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .logo { font-weight: 700; font-size: 1.5rem; color: var(--accent); letter-spacing: -1px; }
        
        .search-box {
            width: 100%; max-width: 500px; position: relative;
        }
        .search-box input {
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #333;
            background: #1a2026; color: white; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,255,115,0.2); }

        /* CATEGORIAS */
        .categories {
            display: flex; gap: 10px; overflow-x: auto; width: 100%; max-width: 1100px; padding: 10px 0;
            scrollbar-width: none;
        }
        .cat-btn {
            background: #1a2026; border: 1px solid #333; color: white; padding: 8px 18px;
            border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem;
        }
        .cat-btn.active { background: var(--accent); color: black; font-weight: bold; }

        .container { max-width: 1100px; margin: auto; padding: 20px; }

        /* GRID DE JOGOS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        .card { 
            background: var(--card); border-radius: 16px; overflow: hidden; transition: 0.3s; 
            border: 1px solid #222; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        
        .card-body { padding: 12px; }
        .card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 4px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .card-meta { font-size: 0.75rem; color: var(--text-dim); display: flex; justify-content: space-between; }

        /* MODAL ESTILIZADO */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); width: 90%; max-width: 450px; border-radius: 24px; animation: pop 0.3s ease; overflow: hidden; }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-header { height: 200px; width: 100%; position: relative; }
        .modal-header img { width: 100%; height: 100%; object-fit: cover; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; font-weight: bold; }
        
        .modal-info { padding: 25px; text-align: center; }
        .dl-section { background: #1a2026; padding: 15px; border-radius: 15px; margin-top: 20px; }
        .btn-main { background: var(--accent); color: black; display: block; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 700; margin-top: 10px; transition: 0.2s; }
        .btn-main:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* ADMIN FLOATING */
        .admin-fab { position: fixed; bottom: 25px; right: 25px; background: #fff; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 99; }
    </style>
</head>
<body>

    <header>
        <div class="logo">ESPAÇO APK</div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Pesquisar jogos..." onkeyup="filtrarJogos()">
        </div>
        <div class="categories" id="categoryList">
            <button class="cat-btn active" onclick="filtrarCategoria('Todos')">Todos</button>
            <button class="cat-btn" onclick="filtrarCategoria('Terror')">Terror</button>
            <button class="cat-btn" onclick="filtrarCategoria('Ação')">Ação</button>
            <button class="cat-btn" onclick="filtrarCategoria('Fnaf')">FNaF</button>
            <button class="cat-btn" onclick="filtrarCategoria('Outros')">Outros</button>
        </div>
    </header>

    <div class="container">
        <div id="lista-jogos" class="grid"></div>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close-btn" onclick="fecharModal()">✕</span>
                <img id="m-img" src="">
            </div>
            <div class="modal-info">
                <h2 id="m-nome" style="margin:0"></h2>
                <p id="m-desc" style="color: var(--text-dim); margin: 15px 0; font-size: 0.9rem;"></p>
                <div class="dl-section">
                    <span style="font-size: 0.8rem; color: var(--accent);">Disponível via Mediafire</span>
                    <a href="#" id="m-link" target="_blank" class="btn-main">BAIXAR AGORA</a>
                </div>
            </div>
        </div>
    </div>

    <a href="postar.html" class="admin-fab">⚙️</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANG8-gOrsk3LZz_9kYqQnz-X7ZVbDQ6x4",
            authDomain: "specialapk-12982.firebaseapp.com",
            projectId: "specialapk-12982",
            storageBucket: "specialapk-12982.firebasestorage.app",
            messagingSenderId: "27533590283",
            appId: "1:27533590283:web:143892ea20a65d7f392c0e",
            measurementId: "G-CR7JBM8TD9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let todosJogos = [];

        // BUSCAR DADOS
        onSnapshot(query(collection(db, "jogos"), orderBy("dataCriacao", "desc")), (snapshot) => {
            todosJogos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderizar(todosJogos);
        });

        function renderizar(lista) {
            const container = document.getElementById('lista-jogos');
            container.innerHTML = "";
            lista.forEach(jogo => {
                container.innerHTML += `
                    <div class="card" onclick='abrirModal(${JSON.stringify(jogo).replace(/'/g, "&apos;")})'>
                        <img src="${jogo.imagemUrl || ''}">
                        <div class="card-body">
                            <span class="card-title">${jogo.nome}</span>
                            <div class="card-meta">
                                <span>APK</span>
                                <span style="color:var(--accent)">Free</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // SISTEMA DE BUSCA
        window.filtrarJogos = () => {
            const termo = document.getElementById('searchInput').value.toLowerCase();
            const filtrados = todosJogos.filter(j => j.nome.toLowerCase().includes(termo));
            renderizar(filtrados);
        };

        // SISTEMA DE CATEGORIA
        window.filtrarCategoria = (cat) => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(cat === 'Todos') return renderizar(todosJogos);
            const filtrados = todosJogos.filter(j => j.categoria === cat);
            renderizar(filtrados);
        };

        window.abrirModal = (jogo) => {
            document.getElementById('m-img').src = jogo.imagemUrl;
            document.getElementById('m-nome').innerText = jogo.nome;
            document.getElementById('m-desc').innerText = jogo.descricao;
            document.getElementById('m-link').href = jogo.link;
            document.getElementById('gameModal').style.display = "flex";
        };

        window.fecharModal = () => document.getElementById('gameModal').style.display = "none";
    </script>
</body>
</html>
