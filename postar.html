<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Painel de Controle | Espaço APK</title>
    <style>
        body { background: #121212; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; padding: 50px; margin: 0; }
        .panel { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #00ff73; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #00ff73; display: flex; align-items: center; gap: 8px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-family: inherit; resize: vertical; }
        input:focus, textarea:focus { outline: none; border-color: #00ff73; }
        button { width: 100%; padding: 15px; background: #00ff73; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: 0.2s; color: #000; }
        button:hover { transform: scale(1.02); filter: brightness(1.1); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link { display: block; text-align: center; margin-top: 20px; }
        .back-link a { color: #aaa; text-decoration: none; }
        .back-link a:hover { color: #00ff73; }
        .error-msg { color: #ff4d4d; font-size: 0.9rem; margin-top: -5px; display: none; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="panel">
        <h2>🚀 Postar Jogo</h2>
        <input type="text" id="nome" placeholder="Título do Jogo" maxlength="50">
        <textarea id="descricao" rows="4" placeholder="Descrição detalhada" maxlength="500"></textarea>
        <input type="text" id="link" placeholder="Link do Mediafire (https://...)">
        <input type="text" id="imagemUrl" placeholder="Link da Imagem (Capa)">
        <div id="errorMsg" class="error-msg"></div>
        <button onclick="enviar()">PUBLICAR NO SITE</button>
        <div class="back-link">
            <a href="index.html">← Voltar ao site</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyANG8-gOrsk3LZz_9kYqQnz-X7ZVbDQ6x4",
            authDomain: "specialapk-12982.firebaseapp.com",
            projectId: "specialapk-12982",
            storageBucket: "specialapk-12982.firebasestorage.app",
            messagingSenderId: "27533590283",
            appId: "1:27533590283:web:143892ea20a65d7f392c0e",
            measurementId: "G-CR7JBM8TD9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.enviar = async () => {
            const nome = document.getElementById('nome').value.trim();
            const descricao = document.getElementById('descricao').value.trim();
            let link = document.getElementById('link').value.trim();
            const imagemUrl = document.getElementById('imagemUrl').value.trim();
            const btn = document.querySelector('button');
            const errorDiv = document.getElementById('errorMsg');

            // Validações
            if (!nome || !descricao || !link || !imagemUrl) {
                errorDiv.textContent = "⚠️ Preencha todos os campos!";
                errorDiv.style.display = "block";
                return;
            }

            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                link = 'https://' + link;
            }

            if (!imagemUrl.startsWith('http://') && !imagemUrl.startsWith('https://')) {
                errorDiv.textContent = "⚠️ Link da imagem deve começar com http:// ou https://";
                errorDiv.style.display = "block";
                return;
            }

            errorDiv.style.display = "none";
            btn.innerText = "Enviando...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "jogos"), {
                    nome: nome,
                    descricao: descricao,
                    link: link,
                    imagemUrl: imagemUrl,
                    dataCriacao: new Date()
                });
                alert("✅ Jogo publicado com sucesso!");
                window.location.href = "index.html";
            } catch (e) {
                console.error(e);
                errorDiv.textContent = "❌ Erro ao publicar. Tente novamente.";
                errorDiv.style.display = "block";
                btn.innerText = "PUBLICAR NO SITE";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
